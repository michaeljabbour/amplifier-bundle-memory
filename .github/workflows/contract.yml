name: Contract check

# Runs hook/tool contract tests against the installed amplifier-core so we
# catch breaking changes in core or foundation before they reach users.
#
# Matrix:
#   - pinned     → the amplifier-core version declared in pyproject.toml
#   - main       → the latest microsoft/amplifier-core@main (canary job,
#                  allowed to fail; surfaces upcoming drift in the PR log)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly at 08:00 UTC on Mondays — catches upstream changes
    # even when this repo is quiet.
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  contract:
    name: contract (${{ matrix.core }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - core: pinned
            extra_install: ""
            continue_on_error: false
          - core: main
            extra_install: "git+https://github.com/microsoft/amplifier-core@main"
            continue_on_error: true
    continue-on-error: ${{ matrix.continue_on_error }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev dependencies
        run: uv sync

      - name: Override amplifier-core (matrix)
        if: matrix.extra_install != ''
        run: uv pip install --reinstall ${{ matrix.extra_install }}

      - name: Show resolved amplifier-core version
        run: uv run python -c "import amplifier_core, importlib.metadata as m; print('amplifier-core:', m.version('amplifier-core'))"

      - name: Run contract + emission tests
        run: uv run pytest tests/test_contract.py tests/test_hook_emissions.py -v

      - name: Run vendor-sweep gate + remaining hermetic unit tests
        # tests/test_vendor_sweep.py is the KG-N4 vendor-zero grep gate
        # (docs/plans/2026-07-07-native-cutover-design.md §12) -- its own
        # docstring says it "runs in every CI pass"; this step makes that true.
        #
        # The remaining files are the rest of the repo-root unit suite
        # (tests/*.py, excluding tests/integration/ which requires a DTU
        # container) that is hermetic -- no daemon, embedder, or network
        # calls -- and verified to pass standalone and together on Python
        # 3.12 (matching this job).
        #
        # Explicitly excluded, and NOT added here:
        #   - tests/integration/            requires a live DTU container
        #
        # tests/test_coordinator_bridge.py's pre-existing failure
        # (test_briefing_assembled_emits_with_drawer_ids) has been fixed --
        # re-added below.
        run: |
          uv run pytest \
            tests/test_vendor_sweep.py \
            tests/test_behavioral_write.py \
            tests/test_benchmark_recall.py \
            tests/test_context_sleep.py \
            tests/test_coordinator_bridge.py \
            tests/test_mutable_embeddings.py \
            tests/test_mutation_seam.py \
            tests/test_salience_gate.py \
            tests/test_usage_weighting.py \
            -v
