[project]
name = "amplifier-module-tool-mempalace"
version = "1.0.0"
description = "High-level Amplifier tool module for MemPalace — palace search, remember, knowledge graph, traverse, diary, and mine operations"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Michael Jabbour" },
]
dependencies = [
    "amplifier-core>=0.1.0",
    "mempalace>=3.3.0",
]

[project.entry-points."amplifier.modules"]
tool-mempalace = "amplifier_module_tool_mempalace:mount"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["amplifier_module_tool_mempalace"]
